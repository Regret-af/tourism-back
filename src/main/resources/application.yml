spring:
  application:
    name: tourism-back
  profiles:
    include:
      - env
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${server.host}:3306/tourism?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${mysql.password}
  redis:
    host: ${redis.host}
    port: 6379
    password: ${redis.password}
    database: 0
  rabbitmq:
    host: ${rabbitmq.host}
    port: ${rabbitmq.port:5672}
    username: ${rabbitmq.username}
    password: ${rabbitmq.password}
    virtual-host: ${rabbitmq.virtual-host:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    throw-exception-if-no-handler-found: true

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

app:
  jwt:
    secret: ${jwt.secret}
    expire-seconds: 86400
  file-upload:
    max-file-size: 10485760
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
  cos:
    provider: COS
    secret-id: ${cos.secret-id}
    secret-key: ${cos.secret-key}
    bucket-name: ${cos.bucket-name}
    region: ${cos.region}
    base-url: ${cos.base-url}
  weather:
    qweather:
      base-url: ${qweather.base-url:https://devapi.qweather.com}
      token: ${qweather.token}
  baidu:
    map:
      base-url: ${baidu.map.base-url:https://api.map.baidu.com}
      ak: ${baidu.map.ak}

logging:
  level:
    com.af.tourism: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httpexchanges
  endpoint:
    httpexchanges:
      enabled: true
